<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LifeFile Tickets – Preston's Pharmacy</title>
<script type="text/javascript" src="https://alcdn.msauth.net/browser/2.38.3/js/msal-browser.min.js" integrity="sha384-WFJrX0i/0D3JNKEHiCHcByvNaHxgMm8hBOIkgFJP00P7UbpN8HBtCMOJQVRTX/s" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f8f7f5; --surface: #ffffff; --border: #e4e2dc; --border-soft: #eeece7;
    --text: #1a1917; --text-muted: #6b6960; --text-faint: #9e9c95;
    --blue: #185FA5; --blue-bg: #E6F1FB; --blue-text: #0C447C;
    --amber: #BA7517; --amber-bg: #FAEEDA; --amber-text: #633806;
    --green: #3B6D11; --green-bg: #EAF3DE; --green-text: #27500A;
    --radius: 10px; --radius-sm: 6px;
  }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; font-size: 14px; line-height: 1.5; min-height: 100vh; }
  .page { max-width: 1150px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }
  #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; text-align: center; }
  #login-screen h1 { font-size: 22px; font-weight: 600; margin-bottom: 8px; }
  #login-screen p { color: var(--text-muted); font-size: 14px; margin-bottom: 28px; max-width: 400px; }
  .btn-login { display: inline-flex; align-items: center; gap: 10px; background: #0067b8; color: #fff; border: none; border-radius: var(--radius-sm); padding: 12px 24px; font-size: 15px; font-weight: 500; cursor: pointer; }
  .btn-login:hover { background: #005a9e; }
  #loading-screen { display: none; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; text-align: center; gap: 16px; }
  .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading-msg { color: var(--text-muted); font-size: 13px; }
  #app { display: none; }
  .page-header { margin-bottom: 1.5rem; display: flex; align-items: flex-start; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
  .page-header h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.3px; }
  .page-header p { font-size: 13px; color: var(--text-muted); margin-top: 4px; }
  .header-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .sync-badge { font-size: 11px; color: var(--text-faint); background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-sm); padding: 4px 10px; white-space: nowrap; }
  .btn-sync { font-size: 12px; padding: 6px 14px; border: 0.5px solid var(--blue); border-radius: var(--radius-sm); background: var(--blue-bg); color: var(--blue); cursor: pointer; font-weight: 500; }
  .btn-sync:hover { background: var(--blue); color: #fff; }
  .btn-sync:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-signout { font-size: 12px; padding: 6px 12px; border: 0.5px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); color: var(--text-muted); cursor: pointer; }
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 1.5rem; }
  .stat { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 1rem 1.25rem; }
  .stat-num { font-size: 26px; font-weight: 600; letter-spacing: -0.5px; }
  .stat-lbl { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .stat-num.blue { color: var(--blue); } .stat-num.amber { color: var(--amber); } .stat-num.green { color: var(--green); }
  .controls { display: flex; gap: 10px; margin-bottom: 1rem; flex-wrap: wrap; align-items: center; }
  .search-wrap { position: relative; flex: 1; min-width: 200px; }
  .search-wrap input { width: 100%; padding: 8px 12px 8px 34px; border: 0.5px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); font-size: 13px; color: var(--text); outline: none; }
  .search-wrap input:focus { border-color: var(--blue); }
  .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text-faint); pointer-events: none; }
  select { padding: 8px 10px; border: 0.5px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); font-size: 13px; color: var(--text); cursor: pointer; outline: none; }
  .filter-pills { display: flex; gap: 6px; flex-wrap: wrap; }
  .pill { padding: 5px 12px; border: 0.5px solid var(--border); border-radius: 100px; background: var(--surface); font-size: 12px; color: var(--text-muted); cursor: pointer; user-select: none; }
  .pill:hover { border-color: #aaa; color: var(--text); }
  .pill.active { background: var(--text); color: #fff; border-color: var(--text); }
  .toolbar { display: flex; justify-content: flex-end; margin-bottom: 0.75rem; }
  .btn-export { font-size: 12px; padding: 6px 14px; border: 0.5px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); color: var(--text-muted); cursor: pointer; }
  .table-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  thead th { background: var(--bg); padding: 10px 14px; text-align: left; font-size: 11px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; color: var(--text-muted); border-bottom: 0.5px solid var(--border); cursor: pointer; user-select: none; white-space: nowrap; }
  tbody tr { border-bottom: 0.5px solid var(--border-soft); cursor: pointer; transition: background 0.1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #fafaf8; }
  td { padding: 11px 14px; vertical-align: middle; }
  .td-id { font-size: 12px; font-weight: 600; color: var(--text-muted); white-space: nowrap; }
  .td-subject { font-weight: 500; font-size: 13px; }
  .td-date { font-size: 12px; color: var(--text-muted); white-space: nowrap; }
  .td-reporter { font-size: 12px; }
  .td-category { font-size: 12px; color: var(--text-muted); }
  .status-select { font-size: 11px; font-weight: 500; border: 0.5px solid var(--border); border-radius: var(--radius-sm); padding: 3px 6px; background: var(--surface); color: var(--text); cursor: pointer; outline: none; }
  .new-badge { display: inline-block; font-size: 10px; font-weight: 700; background: var(--amber-bg); color: var(--amber-text); border-radius: 100px; padding: 1px 6px; margin-left: 6px; }
  .expand-row td { padding: 0; border-bottom: 0.5px solid var(--border-soft); }
  .expand-inner { padding: 16px 20px 20px; background: #f7f6f3; border-top: 0.5px solid var(--border-soft); }
  .expand-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 14px; }
  .expand-section-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text-faint); margin-bottom: 5px; }
  .expand-section-body { font-size: 13px; color: var(--text-muted); line-height: 1.6; background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-sm); padding: 8px 10px; min-height: 52px; }
  .notes-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .notes-wrap label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text-faint); display: block; margin-bottom: 5px; }
  .notes-wrap textarea { width: 100%; font-size: 13px; color: var(--text); font-family: inherit; background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-sm); padding: 8px 10px; resize: vertical; min-height: 72px; line-height: 1.5; outline: none; }
  .notes-wrap textarea:focus { border-color: var(--blue); }
  .empty-row td { text-align: center; padding: 3rem; color: var(--text-muted); font-size: 13px; }
  .error-bar { background: #FFF0F0; border: 0.5px solid #FFCCCC; border-radius: var(--radius-sm); padding: 10px 14px; font-size: 13px; color: #8B0000; margin-bottom: 1rem; display: none; }
  @media (max-width: 700px) {
    .stats { grid-template-columns: repeat(2, 1fr); }
    .col-cat, .col-rep { display: none; }
    .expand-grid, .notes-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="page">
  <div id="login-screen">
    <h1>LifeFile Ticket Dashboard</h1>
    <p>Preston's Pharmacy — Sign in with your Microsoft account to load your LF TICKETS folder live from Outlook.</p>
    <button class="btn-login" id="loginBtn">
      <svg width="20" height="20" viewBox="0 0 23 23" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M1 1h10v10H1V1z" fill="#f25022"/><path d="M12 1h10v10H12V1z" fill="#7fba00"/><path d="M1 12h10v10H1V12z" fill="#00a4ef"/><path d="M12 12h10v10H12V12z" fill="#ffb900"/></svg>
      Sign in with Microsoft
    </button>
    <p id="login-error" style="color:#c00;margin-top:16px;font-size:12px;display:none"></p>
  </div>
  <div id="loading-screen">
    <div class="spinner"></div>
    <div id="loading-msg">Loading…</div>
  </div>
  <div id="app">
    <div class="page-header">
      <div>
        <h1>LifeFile support tickets</h1>
        <p>Preston's Pharmacy — live from Outlook LF TICKETS folder</p>
      </div>
      <div class="header-right">
        <span class="sync-badge" id="sync-badge">Not synced yet</span>
        <button class="btn-sync" id="sync-btn" onclick="syncTickets()">&#8635; Sync now</button>
        <button class="btn-signout" onclick="signOut()">Sign out</button>
      </div>
    </div>
    <div class="error-bar" id="error-bar"></div>
    <div class="stats" id="stats"></div>
    <div class="controls">
      <div class="search-wrap">
        <span class="search-icon">&#128269;</span>
        <input type="search" id="search" placeholder="Search ticket #, subject, keyword…" oninput="render()">
      </div>
      <select id="catFilter" onchange="render()">
        <option value="">All categories</option>
        <option>Printing / labels</option>
        <option>Patient portal</option>
        <option>Billing / invoices</option>
        <option>Lot management</option>
        <option>Shipping / webhook</option>
        <option>Enhancement request</option>
        <option>Java / system</option>
        <option>Workflow / settings</option>
        <option>Reporting</option>
        <option>Other</option>
      </select>
      <div class="filter-pills" id="pills"></div>
    </div>
    <div class="toolbar">
      <button class="btn-export" onclick="exportCSV()">&#8659; Export CSV</button>
    </div>
    <div class="table-card">
      <table>
        <thead>
          <tr>
            <th style="width:115px" onclick="sort('id')">Ticket # <span id="s-id"></span></th>
            <th onclick="sort('subject')">Subject <span id="s-subject"></span></th>
            <th style="width:90px" class="col-date" onclick="sort('date')">Date <span id="s-date"></span></th>
            <th style="width:90px" class="col-rep" onclick="sort('reporter')">Reporter</th>
            <th style="width:130px" class="col-cat">Category</th>
            <th style="width:110px" onclick="sort('status')">Status <span id="s-status"></span></th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
const CLIENT_ID   = '47090a0b-439b-4dbf-9f4b-7ca11273d312';
const TENANT_ID   = '65315457-b5c6-43ea-a82b-a3c98a8fefc8';
const FOLDER_NAME = 'LF TICKETS';

let msalInstance = null;
let TICKETS = [];
let sortCol = 'date', sortDir = -1, statusFilter = 'all', expanded = null;

function waitForMsal(cb, tries) {
  tries = tries || 0;
  if (typeof msal !== 'undefined') { cb(); return; }
  if (tries > 50) {
    document.getElementById('login-error').style.display = 'block';
    document.getElementById('login-error').textContent = 'Error: Microsoft login library failed to load. Please check your internet connection and refresh.';
    return;
  }
  setTimeout(function(){ waitForMsal(cb, tries + 1); }, 200);
}

async function initMsal() {
  const config = {
    auth: {
      clientId: CLIENT_ID,
      authority: 'https://login.microsoftonline.com/' + TENANT_ID,
      redirectUri: window.location.href.split('?')[0].split('#')[0],
    },
    cache: { cacheLocation: 'localStorage', storeAuthStateInCookie: true }
  };
  msalInstance = new msal.PublicClientApplication(config);
  await msalInstance.initialize();

  // Handle redirect response
  try {
    const resp = await msalInstance.handleRedirectPromise();
    if (resp && resp.account) {
      afterLogin();
      return;
    }
  } catch(e) { console.warn('Redirect error:', e); }

  // Check existing account
  const accounts = msalInstance.getAllAccounts();
  if (accounts.length > 0) {
    afterLogin();
    return;
  }

  show('login-screen');
  document.getElementById('loginBtn').onclick = signIn;
}

async function signIn() {
  show('loading-screen');
  setMsg('Signing in…');
  try {
    await msalInstance.loginRedirect({
      scopes: ['Mail.Read', 'User.Read'],
      prompt: 'select_account'
    });
  } catch(e) {
    show('login-screen');
    document.getElementById('login-error').style.display = 'block';
    document.getElementById('login-error').textContent = 'Sign in failed: ' + e.message;
  }
}

function signOut() {
  msalInstance.logoutRedirect();
}

async function getToken() {
  const accounts = msalInstance.getAllAccounts();
  if (!accounts.length) throw new Error('Not signed in');
  try {
    const r = await msalInstance.acquireTokenSilent({ scopes: ['Mail.Read'], account: accounts[0] });
    return r.accessToken;
  } catch {
    const r = await msalInstance.acquireTokenPopup({ scopes: ['Mail.Read'] });
    return r.accessToken;
  }
}

async function afterLogin() {
  show('loading-screen');
  setMsg('Loading tickets…');
  loadSaved();
  buildPills();
  show('app');
  await syncTickets();
}

async function syncTickets() {
  const btn = document.getElementById('sync-btn');
  btn.disabled = true; btn.textContent = '⟳ Syncing…';
  showError('');
  try {
    const token = await getToken();
    // Get folder
    const fr = await fetch('https://graph.microsoft.com/v1.0/me/mailFolders?$top=50', { headers: { Authorization: 'Bearer ' + token } });
    const fd = await fr.json();
    const folder = (fd.value || []).find(f => f.displayName.toUpperCase() === FOLDER_NAME.toUpperCase());
    if (!folder) throw new Error('Could not find folder "' + FOLDER_NAME + '" in your Outlook.');

    // Fetch all messages
    let msgs = [], url = 'https://graph.microsoft.com/v1.0/me/mailFolders/' + folder.id + '/messages?$top=50&$select=subject,receivedDateTime,from,bodyPreview&$orderby=receivedDateTime desc';
    while (url) {
      const r = await fetch(url, { headers: { Authorization: 'Bearer ' + token } });
      const d = await r.json();
      if (d.error) throw new Error(d.error.message);
      msgs = msgs.concat(d.value || []);
      url = d['@odata.nextLink'] || null;
    }

    processMessages(msgs);
    const now = new Date();
    document.getElementById('sync-badge').textContent = 'Synced ' + now.toLocaleDateString() + ' ' + now.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
  } catch(e) {
    showError('Sync failed: ' + e.message);
  }
  btn.disabled = false; btn.textContent = '⟳ Sync now';
  render();
}

function parseId(subject) {
  const m = (subject || '').match(/\[?(LF-\d+)\]?/i);
  return m ? m[1].toUpperCase() : null;
}

function guessCategory(s, p) {
  const t = (s + ' ' + p).toLowerCase();
  if (/label|print|truncat|zebra|batch.*print|rx.*label/.test(t)) return 'Printing / labels';
  if (/patient.?portal|sms|email.*notif|shipping.*profile/.test(t)) return 'Patient portal';
  if (/invoice|billing|claim.?form|ucf|awp|payment|cost/.test(t)) return 'Billing / invoices';
  if (/lot|compoun|ingredient|purchase.?entr|sterile|venlafaxine/.test(t)) return 'Lot management';
  if (/webhook|shipping.*push|ebm|datapush/.test(t)) return 'Shipping / webhook';
  if (/enhancement|request.*add|feature.*request|display.*bud|due.?date/.test(t)) return 'Enhancement request';
  if (/java|colored.?dot|spinning/.test(t)) return 'Java / system';
  if (/report|doctor.*report|rx.*process/.test(t)) return 'Reporting';
  if (/fulfillment|verification|reconcil|inactive|workflow|queue|refill|notif/.test(t)) return 'Workflow / settings';
  return 'Other';
}

function guessStatus(s, p) {
  const t = (s + ' ' + p).toLowerCase();
  if (/ticket.*closed|this ticket has been closed|confirmed.*resolv|it works now|working now/.test(t)) return 'resolved';
  return 'open';
}

function processMessages(msgs) {
  const seen = new Map();
  msgs.forEach(function(msg) {
    const id = parseId(msg.subject || '');
    if (!id) return;
    const date = (msg.receivedDateTime || '').split('T')[0];
    const reporter = (msg.from && msg.from.emailAddress) ? (msg.from.emailAddress.name || msg.from.emailAddress.address) : 'Unknown';
    const preview = msg.bodyPreview || '';
    const subject = (msg.subject || '').replace(/^(Re:|Fw:|Fwd:|\[LF-\d+\])\s*/gi, '').trim();
    if (!seen.has(id)) {
      const saved = getSaved(id);
      seen.set(id, {
        id: id, subject: subject, date: date, reporter: reporter,
        category: guessCategory(subject, preview),
        status: (saved && saved.status) || guessStatus(subject, preview),
        description: preview.slice(0, 300) + (preview.length > 300 ? '…' : ''),
        resolution: (saved && saved.resolution) || '',
        notes: (saved && saved.notes) || '',
        isNew: !saved
      });
    } else {
      const ex = seen.get(id);
      if (!getSaved(id)) {
        if (guessStatus(subject, preview) === 'resolved') ex.status = 'resolved';
      }
    }
  });
  const incoming = Array.from(seen.values());
  incoming.forEach(function(t) {
    const ex = TICKETS.find(function(e) { return e.id === t.id; });
    if (!ex) TICKETS.push(t);
    else if (!ex.description) ex.description = t.description;
  });
  TICKETS.sort(function(a, b) { return a.date < b.date ? 1 : -1; });
  saveAll();
}

function getSaved(id) {
  try { const a = JSON.parse(localStorage.getItem('lf_v3') || '{}'); return a[id] || null; } catch { return null; }
}
function saveAll() {
  try {
    const o = {};
    TICKETS.forEach(function(t) { o[t.id] = { status: t.status, notes: t.notes, resolution: t.resolution }; });
    localStorage.setItem('lf_v3', JSON.stringify(o));
  } catch(e) {}
}
function loadSaved() {
  try {
    const a = JSON.parse(localStorage.getItem('lf_v3') || '{}');
    Object.keys(a).forEach(function(id) {
      const t = TICKETS.find(function(t) { return t.id === id; });
      if (t) { t.status = a[id].status; t.notes = a[id].notes || ''; t.resolution = a[id].resolution || ''; }
    });
  } catch(e) {}
}

function show(id) {
  ['login-screen','loading-screen','app'].forEach(function(s) {
    const el = document.getElementById(s);
    if (el) el.style.display = s === id ? (s === 'loading-screen' ? 'flex' : 'block') : 'none';
  });
  if (id === 'login-screen') document.getElementById('login-screen').style.display = 'flex';
}
function setMsg(m) { const el = document.getElementById('loading-msg'); if (el) el.textContent = m; }
function showError(m) { const el = document.getElementById('error-bar'); if(el){ el.textContent = m; el.style.display = m ? 'block' : 'none'; } }
function fmtDate(d) { if (!d) return ''; const p = d.split('-'); return p[1]+'/'+p[2]+'/'+p[0].slice(2); }

function buildPills() {
  const opts = [['all','All'],['open','Open'],['active','In progress'],['resolved','Resolved']];
  document.getElementById('pills').innerHTML = opts.map(function(o) {
    return '<span class="pill' + (statusFilter===o[0]?' active':'') + '" onclick="setStatus(\'' + o[0] + '\')">' + o[1] + '</span>';
  }).join('');
}
function setStatus(s) { statusFilter = s; buildPills(); render(); }

function sort(col) {
  if (sortCol === col) sortDir *= -1; else { sortCol = col; sortDir = col==='date'?-1:1; }
  document.querySelectorAll('[id^="s-"]').forEach(function(e) { e.textContent = ''; });
  const el = document.getElementById('s-'+col);
  if (el) el.textContent = sortDir === 1 ? '↑' : '↓';
  render();
}

function updateStats() {
  const open = TICKETS.filter(function(t){return t.status==='open';}).length;
  const active = TICKETS.filter(function(t){return t.status==='active';}).length;
  const resolved = TICKETS.filter(function(t){return t.status==='resolved';}).length;
  document.getElementById('stats').innerHTML =
    '<div class="stat"><div class="stat-num">' + TICKETS.length + '</div><div class="stat-lbl">Total tickets</div></div>' +
    '<div class="stat"><div class="stat-num blue">' + open + '</div><div class="stat-lbl">Open</div></div>' +
    '<div class="stat"><div class="stat-num amber">' + active + '</div><div class="stat-lbl">In progress</div></div>' +
    '<div class="stat"><div class="stat-num green">' + resolved + '</div><div class="stat-lbl">Resolved</div></div>';
}

function render() {
  const q = (document.getElementById('search') ? document.getElementById('search').value : '').toLowerCase();
  const cat = document.getElementById('catFilter') ? document.getElementById('catFilter').value : '';
  let data = TICKETS.filter(function(t) {
    if (statusFilter !== 'all' && t.status !== statusFilter) return false;
    if (cat && t.category !== cat) return false;
    if (q && ![t.id,t.subject,t.description,t.resolution,t.reporter,t.category,t.notes].some(function(f){return (f||'').toLowerCase().includes(q);})) return false;
    return true;
  });
  data.sort(function(a,b) { const va=a[sortCol]||'',vb=b[sortCol]||''; return va<vb?-sortDir:va>vb?sortDir:0; });
  updateStats();
  const tb = document.getElementById('tbody');
  if (!tb) return;
  if (!data.length) { tb.innerHTML = '<tr class="empty-row"><td colspan="6">No tickets match your filters.</td></tr>'; return; }
  tb.innerHTML = data.map(function(t) {
    const eid = t.id.replace(/[^a-z0-9]/gi,'_');
    return '<tr onclick="toggle(\'' + t.id + '\')" class="' + (expanded===t.id?'expanded':'') + '">' +
      '<td class="td-id">' + t.id + (t.isNew?'<span class="new-badge">NEW</span>':'') + '</td>' +
      '<td class="td-subject">' + t.subject + '</td>' +
      '<td class="td-date col-date">' + fmtDate(t.date) + '</td>' +
      '<td class="td-reporter col-rep">' + t.reporter + '</td>' +
      '<td class="td-category col-cat">' + t.category + '</td>' +
      '<td onclick="event.stopPropagation()">' +
        '<select class="status-select" onchange="changeStatus(\'' + t.id + '\',this.value)">' +
          '<option value="open"' + (t.status==='open'?' selected':'') + '>Open</option>' +
          '<option value="active"' + (t.status==='active'?' selected':'') + '>In progress</option>' +
          '<option value="resolved"' + (t.status==='resolved'?' selected':'') + '>Resolved</option>' +
          '<option value="enhancement"' + (t.status==='enhancement'?' selected':'') + '>Enhancement</option>' +
        '</select></td></tr>' +
      (expanded===t.id ?
        '<tr class="expand-row"><td colspan="6"><div class="expand-inner">' +
          '<div class="expand-grid">' +
            '<div><div class="expand-section-label">Issue description</div><div class="expand-section-body">' + (t.description||'<i style="color:var(--text-faint)">No description.</i>') + '</div></div>' +
            '<div><div class="expand-section-label">Resolution notes</div><div class="expand-section-body">' + (t.resolution||'<i style="color:var(--text-faint)">No resolution recorded yet.</i>') + '</div></div>' +
          '</div>' +
          '<div class="notes-row">' +
            '<div class="notes-wrap"><label>✏ Resolution notes</label><textarea placeholder="Document how this was resolved…" onchange="saveResolution(\'' + t.id + '\',this.value)" onclick="event.stopPropagation()">' + (t.resolution||'') + '</textarea></div>' +
            '<div class="notes-wrap"><label>📋 Internal notes</label><textarea placeholder="Your own notes…" onchange="saveNote(\'' + t.id + '\',this.value)" onclick="event.stopPropagation()">' + (t.notes||'') + '</textarea></div>' +
          '</div>' +
        '</div></td></tr>' : '');
  }).join('');
}

function toggle(id) { expanded = expanded === id ? null : id; render(); }
function changeStatus(id,val) { const t=TICKETS.find(function(r){return r.id===id;}); if(t){t.status=val;saveAll();} render(); }
function saveNote(id,val) { const t=TICKETS.find(function(r){return r.id===id;}); if(t){t.notes=val;saveAll();} }
function saveResolution(id,val) { const t=TICKETS.find(function(r){return r.id===id;}); if(t){t.resolution=val;saveAll();} }

function exportCSV() {
  const rows = [['Ticket ID','Subject','Date','Reporter','Category','Status','Resolution Notes','Internal Notes']];
  TICKETS.forEach(function(t) {
    rows.push([t.id,'"'+(t.subject||'').replace(/"/g,'""')+'"',t.date,t.reporter,t.category,t.status,'"'+(t.resolution||'').replace(/"/g,'""')+'"','"'+(t.notes||'').replace(/"/g,'""')+'"']);
  });
  const csv = rows.map(function(r){return r.join(',');}).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = 'lifefile_tickets.csv';
  a.click();
}

// Boot
show('loading-screen');
setMsg('Loading Microsoft login library…');
waitForMsal(function() {
  setMsg('Initializing…');
  initMsal().catch(function(e) {
    show('login-screen');
    document.getElementById('login-error').style.display = 'block';
    document.getElementById('login-error').textContent = 'Init error: ' + e.message;
  });
});
</script>
