<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LifeFile Tickets – Preston's Pharmacy</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-authentication-library/2.38.3/msal-browser.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f8f7f5; --surface: #ffffff; --border: #e4e2dc; --border-soft: #eeece7;
    --text: #1a1917; --text-muted: #6b6960; --text-faint: #9e9c95;
    --blue: #185FA5; --blue-bg: #E6F1FB; --blue-text: #0C447C;
    --amber: #BA7517; --amber-bg: #FAEEDA; --amber-text: #633806;
    --green: #3B6D11; --green-bg: #EAF3DE; --green-text: #27500A;
    --purple: #534AB7; --purple-bg: #EEEDFE; --purple-text: #3C3489;
    --radius: 10px; --radius-sm: 6px;
  }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; font-size: 14px; line-height: 1.5; min-height: 100vh; }
  .page { max-width: 1150px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

  /* Login screen */
  #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; text-align: center; }
  #login-screen h1 { font-size: 22px; font-weight: 600; margin-bottom: 8px; }
  #login-screen p { color: var(--text-muted); font-size: 14px; margin-bottom: 28px; }
  .btn-login { display: inline-flex; align-items: center; gap: 10px; background: #0067b8; color: #fff; border: none; border-radius: var(--radius-sm); padding: 12px 24px; font-size: 15px; font-weight: 500; cursor: pointer; }
  .btn-login:hover { background: #005a9e; }
  .btn-login svg { width: 20px; height: 20px; }

  /* Loading */
  #loading-screen { display: none; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; text-align: center; gap: 16px; }
  .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading-msg { color: var(--text-muted); font-size: 13px; }

  /* Main app */
  #app { display: none; }
  .page-header { margin-bottom: 1.5rem; display: flex; align-items: flex-start; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
  .page-header h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.3px; }
  .page-header p { font-size: 13px; color: var(--text-muted); margin-top: 4px; }
  .header-right { display: flex; align-items: center; gap: 8px; }
  .sync-badge { font-size: 11px; color: var(--text-faint); background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-sm); padding: 4px 10px; white-space: nowrap; }
  .btn-sync { font-size: 12px; padding: 6px 14px; border: 0.5px solid var(--blue); border-radius: var(--radius-sm); background: var(--blue-bg); color: var(--blue); cursor: pointer; font-weight: 500; }
  .btn-sync:hover { background: var(--blue); color: #fff; }
  .btn-sync:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-signout { font-size: 12px; padding: 6px 12px; border: 0.5px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); color: var(--text-muted); cursor: pointer; }

  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 1.5rem; }
  .stat { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 1rem 1.25rem; }
  .stat-num { font-size: 26px; font-weight: 600; letter-spacing: -0.5px; }
  .stat-lbl { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .stat-num.blue { color: var(--blue); } .stat-num.amber { color: var(--amber); } .stat-num.green { color: var(--green); }

  .controls { display: flex; gap: 10px; margin-bottom: 1rem; flex-wrap: wrap; align-items: center; }
  .search-wrap { position: relative; flex: 1; min-width: 200px; }
  .search-wrap input { width: 100%; padding: 8px 12px 8px 34px; border: 0.5px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); font-size: 13px; color: var(--text); outline: none; }
  .search-wrap input:focus { border-color: var(--blue); }
  .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text-faint); font-size: 15px; pointer-events: none; }
  select { padding: 8px 10px; border: 0.5px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); font-size: 13px; color: var(--text); cursor: pointer; outline: none; }
  .filter-pills { display: flex; gap: 6px; flex-wrap: wrap; }
  .pill { padding: 5px 12px; border: 0.5px solid var(--border); border-radius: 100px; background: var(--surface); font-size: 12px; color: var(--text-muted); cursor: pointer; user-select: none; }
  .pill:hover { border-color: #aaa; color: var(--text); }
  .pill.active { background: var(--text); color: #fff; border-color: var(--text); }

  .toolbar { display: flex; justify-content: flex-end; margin-bottom: 0.75rem; }
  .btn-export { font-size: 12px; padding: 6px 14px; border: 0.5px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); color: var(--text-muted); cursor: pointer; }
  .btn-export:hover { background: var(--bg); color: var(--text); }

  .table-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  thead th { background: var(--bg); padding: 10px 14px; text-align: left; font-size: 11px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; color: var(--text-muted); border-bottom: 0.5px solid var(--border); cursor: pointer; user-select: none; white-space: nowrap; }
  thead th:hover { color: var(--text); }
  tbody tr { border-bottom: 0.5px solid var(--border-soft); cursor: pointer; transition: background 0.1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #fafaf8; }
  tbody tr.expanded { background: #fafaf8; }
  td { padding: 11px 14px; vertical-align: middle; }
  .td-id { font-size: 12px; font-weight: 600; color: var(--text-muted); white-space: nowrap; }
  .td-subject { font-weight: 500; font-size: 13px; }
  .td-date { font-size: 12px; color: var(--text-muted); white-space: nowrap; }
  .td-reporter { font-size: 12px; }
  .td-category { font-size: 12px; color: var(--text-muted); }
  .status-select { font-size: 11px; font-weight: 500; border: 0.5px solid var(--border); border-radius: var(--radius-sm); padding: 3px 6px; background: var(--surface); color: var(--text); cursor: pointer; outline: none; }
  .new-badge { display: inline-block; font-size: 10px; font-weight: 700; background: var(--amber-bg); color: var(--amber-text); border-radius: 100px; padding: 1px 6px; margin-left: 6px; vertical-align: middle; }

  .expand-row td { padding: 0; border-bottom: 0.5px solid var(--border-soft); }
  .expand-inner { padding: 16px 20px 20px; background: #f7f6f3; border-top: 0.5px solid var(--border-soft); }
  .expand-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 14px; }
  .expand-section-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text-faint); margin-bottom: 5px; }
  .expand-section-body { font-size: 13px; color: var(--text-muted); line-height: 1.6; background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-sm); padding: 8px 10px; min-height: 52px; }
  .notes-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .notes-wrap label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text-faint); display: block; margin-bottom: 5px; }
  .notes-wrap textarea { width: 100%; font-size: 13px; color: var(--text); font-family: inherit; background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-sm); padding: 8px 10px; resize: vertical; min-height: 72px; line-height: 1.5; outline: none; }
  .notes-wrap textarea:focus { border-color: var(--blue); }
  .empty-row td { text-align: center; padding: 3rem; color: var(--text-muted); font-size: 13px; }
  .error-bar { background: #FFF0F0; border: 0.5px solid #FFCCCC; border-radius: var(--radius-sm); padding: 10px 14px; font-size: 13px; color: #8B0000; margin-bottom: 1rem; display: none; }

  @media (max-width: 700px) {
    .stats { grid-template-columns: repeat(2, 1fr); }
    .col-cat, .col-rep { display: none; }
    .expand-grid, .notes-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="page">

  <!-- Login Screen -->
  <div id="login-screen">
    <h1>LifeFile Ticket Dashboard</h1>
    <p>Preston's Pharmacy &mdash; Sign in with your Microsoft account to load your LF TICKETS folder</p>
    <button class="btn-login" onclick="signIn()">
      <svg viewBox="0 0 23 23" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M1 1h10v10H1V1z" fill="#f25022"/><path d="M12 1h10v10H12V1z" fill="#7fba00"/><path d="M1 12h10v10H1V12z" fill="#00a4ef"/><path d="M12 12h10v10H12V12z" fill="#ffb900"/></svg>
      Sign in with Microsoft
    </button>
  </div>

  <!-- Loading Screen -->
  <div id="loading-screen">
    <div class="spinner"></div>
    <div id="loading-msg">Signing in…</div>
  </div>

  <!-- Main App -->
  <div id="app">
    <div class="page-header">
      <div>
        <h1>LifeFile support tickets</h1>
        <p>Preston's Pharmacy &mdash; LF TICKETS folder (live from Outlook)</p>
      </div>
      <div class="header-right">
        <span class="sync-badge" id="sync-badge">Not synced yet</span>
        <button class="btn-sync" id="sync-btn" onclick="syncTickets()">&#8635; Sync now</button>
        <button class="btn-signout" onclick="signOut()">Sign out</button>
      </div>
    </div>

    <div class="error-bar" id="error-bar"></div>
    <div class="stats" id="stats"></div>

    <div class="controls">
      <div class="search-wrap">
        <span class="search-icon">&#128269;</span>
        <input type="search" id="search" placeholder="Search ticket #, subject, keyword…" oninput="render()">
      </div>
      <select id="catFilter" onchange="render()">
        <option value="">All categories</option>
        <option>Printing / labels</option>
        <option>Patient portal</option>
        <option>Billing / invoices</option>
        <option>Lot management</option>
        <option>Shipping / webhook</option>
        <option>Enhancement request</option>
        <option>Java / system</option>
        <option>Workflow / settings</option>
        <option>Reporting</option>
        <option>Other</option>
      </select>
      <div class="filter-pills" id="pills"></div>
    </div>

    <div class="toolbar">
      <button class="btn-export" onclick="exportCSV()">&#8659; Export CSV</button>
    </div>

    <div class="table-card">
      <table>
        <thead>
          <tr>
            <th style="width:110px" onclick="sort('id')">Ticket # <span id="s-id"></span></th>
            <th onclick="sort('subject')">Subject <span id="s-subject"></span></th>
            <th style="width:90px" class="col-date" onclick="sort('date')">Date <span id="s-date"></span></th>
            <th style="width:90px" class="col-rep" onclick="sort('reporter')">Reporter <span id="s-reporter"></span></th>
            <th style="width:130px" class="col-cat">Category</th>
            <th style="width:110px" onclick="sort('status')">Status <span id="s-status"></span></th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>

</div>

<script>
// ── CONFIG ──────────────────────────────────────────────
const CLIENT_ID   = '47090a0b-439b-4dbf-9f4b-7ca11273d312';
const TENANT_ID   = '65315457-b5c6-43ea-a82b-a3c98a8fefc8';
const FOLDER_NAME = 'LF TICKETS';
const BATCH_SIZE  = 50;
// ────────────────────────────────────────────────────────

const msalConfig = {
  auth: {
    clientId: CLIENT_ID,
    authority: `https://login.microsoftonline.com/${TENANT_ID}`,
    redirectUri: window.location.href.split('?')[0].split('#')[0],
  },
  cache: { cacheLocation: 'localStorage' }
};

const msalInstance = new msal.PublicClientApplication(msalConfig);
const scopes = ['Mail.Read', 'User.Read'];

let TICKETS = [];
let sortCol = 'date', sortDir = -1, statusFilter = 'all', expanded = null;

// ── AUTH ─────────────────────────────────────────────────
async function init() {
  await msalInstance.initialize();
  const resp = await msalInstance.handleRedirectPromise();
  if (resp) { afterLogin(); return; }
  const accounts = msalInstance.getAllAccounts();
  if (accounts.length > 0) { afterLogin(); return; }
  show('login-screen');
}

async function signIn() {
  show('loading-screen');
  setLoadingMsg('Signing in…');
  try {
    await msalInstance.loginRedirect({ scopes });
  } catch(e) { show('login-screen'); }
}

function signOut() {
  msalInstance.logoutRedirect();
}

async function getToken() {
  const accounts = msalInstance.getAllAccounts();
  if (!accounts.length) throw new Error('Not signed in');
  try {
    const res = await msalInstance.acquireTokenSilent({ scopes, account: accounts[0] });
    return res.accessToken;
  } catch {
    const res = await msalInstance.acquireTokenPopup({ scopes });
    return res.accessToken;
  }
}

async function afterLogin() {
  show('loading-screen');
  setLoadingMsg('Loading your tickets…');
  loadSaved();
  buildPills();
  updateStats();
  show('app');
  await syncTickets();
}

// ── SYNC ─────────────────────────────────────────────────
async function syncTickets() {
  const btn = document.getElementById('sync-btn');
  btn.disabled = true;
  btn.textContent = '⟳ Syncing…';
  showError('');
  setLoadingMsg('Fetching emails…');

  try {
    const token = await getToken();

    // Find folder ID
    const foldersRes = await fetch(
      `https://graph.microsoft.com/v1.0/me/mailFolders?$top=50`,
      { headers: { Authorization: `Bearer ${token}` } }
    );
    const foldersData = await foldersRes.json();
    const folder = foldersData.value?.find(f =>
      f.displayName.toUpperCase() === FOLDER_NAME.toUpperCase()
    );
    if (!folder) throw new Error(`Could not find folder "${FOLDER_NAME}" in your Outlook.`);

    // Fetch all messages
    let messages = [];
    let url = `https://graph.microsoft.com/v1.0/me/mailFolders/${folder.id}/messages?$top=${BATCH_SIZE}&$select=subject,receivedDateTime,from,bodyPreview&$orderby=receivedDateTime desc`;

    while (url) {
      const res = await fetch(url, { headers: { Authorization: `Bearer ${token}` } });
      const data = await res.json();
      if (data.error) throw new Error(data.error.message);
      messages = messages.concat(data.value || []);
      url = data['@odata.nextLink'] || null;
    }

    // Parse unique tickets from subjects
    processMessages(messages);

    const now = new Date();
    document.getElementById('sync-badge').textContent =
      `Synced ${now.toLocaleDateString()} ${now.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}`;

  } catch(e) {
    showError('Sync failed: ' + e.message);
  }

  btn.disabled = false;
  btn.textContent = '⟳ Sync now';
  render();
}

function parseTicketId(subject) {
  const m = subject.match(/\[?(LF-\d+)\]?/i);
  return m ? m[1].toUpperCase() : null;
}

function guessCategory(subject, preview) {
  const text = (subject + ' ' + preview).toLowerCase();
  if (/label|print|truncat|zebra|batch.*print|rx.*label/i.test(text)) return 'Printing / labels';
  if (/patient.?portal|sms|email.*notif|shipping.*profile/i.test(text)) return 'Patient portal';
  if (/invoice|billing|claim.?form|ucf|awp|payment|cost/i.test(text)) return 'Billing / invoices';
  if (/lot|compoun|ingredient|purchase.?entr|sterile|venlafaxine/i.test(text)) return 'Lot management';
  if (/webhook|shipping.*push|ebm|datapush/i.test(text)) return 'Shipping / webhook';
  if (/enhancement|request.*add|feature.*request|display.*bud|due.?date/i.test(text)) return 'Enhancement request';
  if (/java|colored.?dot|spinning/i.test(text)) return 'Java / system';
  if (/report|doctor.*report|rx.*process/i.test(text)) return 'Reporting';
  if (/fulfillment|verification|reconcil|inactive|workflow|queue|refill|notif/i.test(text)) return 'Workflow / settings';
  return 'Other';
}

function guessStatus(subject, preview) {
  const text = (subject + ' ' + preview).toLowerCase();
  if (/ticket.*closed|this ticket has been closed|confirmed.*resolv|resolv.*confirm|it works now|working now/i.test(text)) return 'resolved';
  if (/new.*ticket.*opened|ticket.*opened|new support ticket/i.test(text)) return 'open';
  return 'open';
}

function processMessages(messages) {
  const seen = new Map(); // ticketId -> ticket object

  messages.forEach(msg => {
    const ticketId = parseTicketId(msg.subject || '');
    if (!ticketId) return;

    const date = msg.receivedDateTime ? msg.receivedDateTime.split('T')[0] : '';
    const reporter = msg.from?.emailAddress?.name || msg.from?.emailAddress?.address || 'Unknown';
    const preview = msg.bodyPreview || '';
    const subject = (msg.subject || '').replace(/^(Re:|Fw:|Fwd:|\[LF-\d+\])\s*/gi, '').trim();

    if (!seen.has(ticketId)) {
      // Load any saved overrides
      const saved = getSaved(ticketId);
      seen.set(ticketId, {
        id: ticketId,
        subject: subject,
        date: date,
        reporter: reporter,
        category: guessCategory(subject, preview),
        status: saved?.status || guessStatus(subject, preview),
        description: preview.slice(0, 300) + (preview.length > 300 ? '…' : ''),
        resolution: saved?.resolution || '',
        notes: saved?.notes || '',
        isNew: !saved,
      });
    } else {
      // Update status if we find a resolution indicator in later emails
      const existing = seen.get(ticketId);
      if (!getSaved(ticketId)?.status) {
        const inferredStatus = guessStatus(subject, preview);
        if (inferredStatus === 'resolved') existing.status = 'resolved';
      }
    }
  });

  // Merge with existing TICKETS (preserve manual edits)
  const incoming = Array.from(seen.values());
  incoming.forEach(t => {
    const existing = TICKETS.find(e => e.id === t.id);
    if (!existing) {
      TICKETS.push(t);
    } else {
      // Keep manual overrides, update description if blank
      if (!existing.description) existing.description = t.description;
    }
  });

  // Sort by date desc
  TICKETS.sort((a, b) => a.date < b.date ? 1 : -1);
  saveAll();
}

// ── STORAGE ──────────────────────────────────────────────
function getSaved(id) {
  try {
    const all = JSON.parse(localStorage.getItem('lf_live_tickets') || '{}');
    return all[id] || null;
  } catch { return null; }
}

function saveAll() {
  try {
    const obj = {};
    TICKETS.forEach(t => { obj[t.id] = { status: t.status, notes: t.notes, resolution: t.resolution }; });
    localStorage.setItem('lf_live_tickets', JSON.stringify(obj));
  } catch(e) {}
}

function loadSaved() {
  try {
    const all = JSON.parse(localStorage.getItem('lf_live_tickets') || '{}');
    Object.entries(all).forEach(([id, saved]) => {
      const t = TICKETS.find(t => t.id === id);
      if (t) { t.status = saved.status; t.notes = saved.notes || ''; t.resolution = saved.resolution || ''; }
    });
  } catch(e) {}
}

// ── UI ────────────────────────────────────────────────────
function show(id) {
  ['login-screen','loading-screen','app'].forEach(s => {
    document.getElementById(s).style.display = s === id ? (s === 'loading-screen' ? 'flex' : s === 'app' ? 'block' : 'flex') : 'none';
  });
}

function setLoadingMsg(msg) {
  const el = document.getElementById('loading-msg');
  if (el) el.textContent = msg;
}

function showError(msg) {
  const el = document.getElementById('error-bar');
  el.textContent = msg;
  el.style.display = msg ? 'block' : 'none';
}

function fmtDate(d) {
  if (!d) return '';
  const [y,m,day] = d.split('-');
  return m+'/'+day+'/'+y.slice(2);
}

function buildPills() {
  const opts = [['all','All'],['open','Open'],['active','In progress'],['resolved','Resolved']];
  document.getElementById('pills').innerHTML = opts.map(([v,l]) =>
    `<span class="pill${statusFilter===v?' active':''}" onclick="setStatus('${v}')">${l}</span>`
  ).join('');
}
function setStatus(s) { statusFilter = s; buildPills(); render(); }

function sort(col) {
  if (sortCol === col) sortDir *= -1; else { sortCol = col; sortDir = col==='date'?-1:1; }
  document.querySelectorAll('[id^="s-"]').forEach(e => e.textContent = '');
  const el = document.getElementById('s-'+col);
  if (el) el.textContent = sortDir === 1 ? '↑' : '↓';
  render();
}

function updateStats() {
  const open = TICKETS.filter(t => t.status==='open').length;
  const active = TICKETS.filter(t => t.status==='active').length;
  const resolved = TICKETS.filter(t => t.status==='resolved').length;
  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="stat-num">${TICKETS.length}</div><div class="stat-lbl">Total tickets</div></div>
    <div class="stat"><div class="stat-num blue">${open}</div><div class="stat-lbl">Open</div></div>
    <div class="stat"><div class="stat-num amber">${active}</div><div class="stat-lbl">In progress</div></div>
    <div class="stat"><div class="stat-num green">${resolved}</div><div class="stat-lbl">Resolved</div></div>
  `;
}

function render() {
  const q = (document.getElementById('search')?.value || '').toLowerCase();
  const cat = document.getElementById('catFilter')?.value || '';
  let data = TICKETS.filter(t => {
    if (statusFilter !== 'all' && t.status !== statusFilter) return false;
    if (cat && t.category !== cat) return false;
    if (q && ![t.id,t.subject,t.description,t.resolution,t.reporter,t.category,t.notes].some(f=>(f||'').toLowerCase().includes(q))) return false;
    return true;
  });
  data.sort((a,b) => {
    const va = a[sortCol]||'', vb = b[sortCol]||'';
    return va < vb ? -sortDir : va > vb ? sortDir : 0;
  });
  updateStats();
  const tb = document.getElementById('tbody');
  if (!tb) return;
  if (!data.length) { tb.innerHTML = `<tr class="empty-row"><td colspan="6">No tickets match your filters.</td></tr>`; return; }
  tb.innerHTML = data.map(t => `
    <tr onclick="toggle('${t.id}')" class="${expanded===t.id?'expanded':''}">
      <td class="td-id">${t.id}${t.isNew?'<span class="new-badge">NEW</span>':''}</td>
      <td class="td-subject">${t.subject}</td>
      <td class="td-date col-date">${fmtDate(t.date)}</td>
      <td class="td-reporter col-rep">${t.reporter}</td>
      <td class="td-category col-cat">${t.category}</td>
      <td onclick="event.stopPropagation()">
        <select class="status-select" onchange="changeStatus('${t.id}',this.value)">
          <option value="open"${t.status==='open'?' selected':''}>Open</option>
          <option value="active"${t.status==='active'?' selected':''}>In progress</option>
          <option value="resolved"${t.status==='resolved'?' selected':''}>Resolved</option>
          <option value="enhancement"${t.status==='enhancement'?' selected':''}>Enhancement</option>
        </select>
      </td>
    </tr>
    ${expanded===t.id?`
    <tr class="expand-row">
      <td colspan="6">
        <div class="expand-inner">
          <div class="expand-grid">
            <div class="expand-section">
              <div class="expand-section-label">Issue description</div>
              <div class="expand-section-body">${t.description||'<span style="color:var(--text-faint);font-style:italic">No description.</span>'}</div>
            </div>
            <div class="expand-section">
              <div class="expand-section-label">Resolution notes</div>
              <div class="expand-section-body">${t.resolution||'<span style="color:var(--text-faint);font-style:italic">No resolution recorded yet.</span>'}</div>
            </div>
          </div>
          <div class="notes-row">
            <div class="notes-wrap">
              <label>✏ Resolution notes (editable)</label>
              <textarea placeholder="Document how this was resolved…" onchange="saveResolution('${t.id}',this.value)" onclick="event.stopPropagation()">${t.resolution||''}</textarea>
            </div>
            <div class="notes-wrap">
              <label>📋 Your internal notes</label>
              <textarea placeholder="Add your own notes, follow-ups, context…" onchange="saveNote('${t.id}',this.value)" onclick="event.stopPropagation()">${t.notes||''}</textarea>
            </div>
          </div>
        </div>
      </td>
    </tr>`:''}
  `).join('');
}

function toggle(id) { expanded = expanded === id ? null : id; render(); }
function changeStatus(id, val) { const t = TICKETS.find(r => r.id===id); if(t){t.status=val;saveAll();} render(); }
function saveNote(id, val) { const t = TICKETS.find(r => r.id===id); if(t){t.notes=val;saveAll();} }
function saveResolution(id, val) { const t = TICKETS.find(r => r.id===id); if(t){t.resolution=val;saveAll();} }

function exportCSV() {
  const rows = [['Ticket ID','Subject','Date','Reporter','Category','Status','Resolution Notes','Internal Notes']];
  TICKETS.forEach(t => rows.push([
    t.id, `"${(t.subject||'').replace(/"/g,'""')}"`, t.date, t.reporter, t.category, t.status,
    `"${(t.resolution||'').replace(/"/g,'""')}"`, `"${(t.notes||'').replace(/"/g,'""')}"`
  ]));
  const csv = rows.map(r => r.join(',')).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = 'lifefile_tickets.csv';
  a.click();
}

// ── BOOT ─────────────────────────────────────────────────
buildPills();
document.getElementById('s-date') && (document.getElementById('s-date').textContent = '↓');
init();
</script>
</body>
</html>
